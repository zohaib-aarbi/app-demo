<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App Tracker</title>

    <!-- MIXPANEL -->
    <script type="text/javascript">
        (function (e, c) {
            if (!c.__SV) {
                var l, h;
                window.mixpanel = c;
                c._i = [];

                c.init = function (q, r, f) {
                    function t(d, a) {
                        var g = a.split(".");
                        if (g.length == 2) {
                            d = d[g[0]];
                            a = g[1];
                        }

                        d[a] = function () {
                            d.push([a].concat(Array.prototype.slice.call(arguments, 0)));
                        };
                    }

                    var b = c;

                    if (typeof f !== "undefined") {
                        b = c[f] = [];
                    } else {
                        f = "mixpanel";
                    }

                    b.people = b.people || [];

                    b.toString = function (d) {
                        var a = "mixpanel";

                        if (f !== "mixpanel") {
                            a += "." + f;
                        }

                        if (!d) {
                            a += " (stub)";
                        }

                        return a;
                    };

                    b.people.toString = function () {
                        return b.toString(1) + ".people (stub)";
                    };

                    l = "disable time_event track track_pageview track_links track_forms track_with_groups add_group set_group remove_group register register_once alias unregister identify name_tag set_config reset opt_in_tracking opt_out_tracking has_opted_in_tracking has_opted_out_tracking clear_opt_in_out_tracking start_batch_senders start_session_recording stop_session_recording people.set people.set_once people.unset people.increment people.append people.union people.track_charge people.clear_charges people.delete_user people.remove".split(" ");

                    for (h = 0; h < l.length; h++) {
                        t(b, l[h]);
                    }

                    c._i.push([q, r, f]);
                };

                c.__SV = 1.2;

                var k = e.createElement("script");
                k.type = "text/javascript";
                k.async = true;
                k.src = "https://cdn.mxpnl.com/libs/mixpanel-2-latest.min.js";

                var s = e.getElementsByTagName("script")[0];
                s.parentNode.insertBefore(k, s);
            }
        })(document, window.mixpanel || []);

        // ==============================
        // INIT MIXPANEL
        // ==============================
        mixpanel.init("4e8d9a66138b594b51835054fa67fba8", {
            autocapture: true,
            record_sessions_percent: 100
        });
    </script>
</head>

<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">
        ✓ DOWNLOAD / INSTALL
    </button>

    <div id="status"></div>

    <script>

        // ==============================
        // CONFIG
        // ==============================
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        const DISCORD_WEBHOOK_URL =
            "YOUR_DISCORD_WEBHOOK";

        // ==============================
        // GET GROUP FROM URL
        // Example:
        // ?group=1
        // ==============================
        const urlParams = new URLSearchParams(window.location.search);

        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        // ==============================
        // UPDATE UI
        // ==============================
        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // ==============================
        // CREATE USER ID
        // ==============================
        let userId = localStorage.getItem("user_id");

        if (!userId) {
            userId = crypto.randomUUID();
            localStorage.setItem("user_id", userId);
        }

        // ==============================
        // IDENTIFY USER
        // ==============================
        mixpanel.identify(userId);

        // ==============================
        // SET USER PROPERTIES
        // ==============================
        mixpanel.people.set_once({
            first_seen: new Date().toISOString()
        });

        mixpanel.people.set({
            whatsapp_group: group,
            browser_language: navigator.language,
            device_platform: navigator.platform
        });

        // ==============================
        // MAIN DOWNLOAD FUNCTION
        // ==============================
        function logDownload() {

            const now = new Date();

            const pakistanTime = new Date(
                now.toLocaleString("en-US", {
                    timeZone: "Asia/Karachi"
                })
            );

            const timestamp = pakistanTime.toISOString();

            const userAgent = navigator.userAgent;

            // ==============================
            // MIXPANEL EVENT
            // ==============================
            mixpanel.track("Download Clicked", {
                whatsapp_group: group,
                timestamp: timestamp,
                device: userAgent
            });

            // ==============================
            // GOOGLE SHEETS
            // ==============================
            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            new Image().src = finalURL;

            // ==============================
            // DISCORD WEBHOOK
            // ==============================
            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content:
                        `📲 New Download\n` +
                        `Group: ${group}\n` +
                        `Time: ${timestamp}\n` +
                        `Device: ${userAgent}`
                })
            })
                .then(res => console.log("Discord status:", res.status))
                .catch(err => console.log("Discord error:", err));

            // ==============================
            // UI STATUS
            // ==============================
            document.getElementById("status").innerHTML =
                "✅ Logged to Mixpanel + Sheets + Discord!";

            document.getElementById("status").style.color = "green";
        }

        // ==============================
        // BUTTON EVENT
        // ==============================
        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);

    </script>

</body>

</html>
