<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixpanel Funnel Demo</title>

    <!-- MIXPANEL -->
    <script type="text/javascript">
        (function (f, b) {
            if (!b.__SV) {
                var a, e, i, g;
                window.mixpanel = b;
                b._i = [];

                b.init = function (a, e, d) {

                    function f(b, h) {
                        var a = h.split(".");
                        if (a.length == 2) {
                            b = b[a[0]];
                            h = a[1];
                        }

                        b[h] = function () {

                        };
                    }

                    var c = b;

                    if (typeof d !== "undefined") {
                        c = b[d] = [];
                    } else {

                    }

                    c.people = c.people || [];

                    c.toString = function (b) {

                        if (d !== "mixpanel") {
                            a += "." + d;
                        }
                        if (!b) {
                            a += " (stub)";
                        }
                        return a;
                    };

                    c.people.toString = function () {
                        return c.toString(1) + ".people (stub)";
                    };

                    i = "disable time_event track track_pageview track_links track_forms track_with_groups add_group set_group remove_group register register_once alias unregister identify name_tag set_config reset opt_in_tracking opt_out_tracking has_opted_in_tracking has_opted_out_tracking clear_opt_in_out_tracking start_batch_senders start_session_recording stop_session_recording people.set people.set_once people.unset people.increment people.append people.union people.track_charge people.clear_charges people.delete_user people.remove".split(" ");

                    for (g = 0; g < i.length; g++) {

                    }

                    b._i.push([a, e, d]);
                };

                b.__SV = 1.2;

        // ==============================
        // INITIALIZE MIXPANEL

        mixpanel.init("4e8d9a66138b594b51835054fa67fba8", {
            autocapture: true,
            record_sessions_percent: 100

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            text-align: center;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
        }

        #groupLabel {
            margin: 20px 0;
            font-size: 20px;
            font-weight: bold;
        }

        button {
            padding: 14px 24px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #4CAF50;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }

        #status {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1>📲 Mixpanel Funnel Demo</h1>

    <div id="groupLabel">Loading group...</div>

    <button id="downloadBtn">
        ✓ DOWNLOAD / INSTALL
    </button>

    <div id="status"></div>

    <script>

        // ==============================
        // GOOGLE SHEETS URL
        // ==============================
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        // ==============================
        // GET GROUP FROM URL
        // Example:
        // index.html?group=1
        // ==============================
        const urlParams = new URLSearchParams(window.location.search);

        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        // ==============================
        // UPDATE UI
        // ==============================
        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // ==============================
        // CREATE UNIQUE USER ID
        // ==============================
        let userId = localStorage.getItem("mixpanel_user_id");

        if (!userId) {
            userId = crypto.randomUUID();
            localStorage.setItem("mixpanel_user_id", userId);
        }

        // ==============================
        // IDENTIFY USER
        // ==============================
        mixpanel.identify(userId);

        // ==============================
        // SET USER PROPERTIES
        // ==============================
        mixpanel.people.set_once({
            first_seen: new Date().toISOString()
        });

        mixpanel.people.set({
            whatsapp_group: group,
            browser_language: navigator.language,
            device_platform: navigator.platform
        });

        // ==============================
        // TRACK PAGE VISIT EVENT
        // ==============================
        mixpanel.track("Page Visited", {
            whatsapp_group: group,
            page_name: "Demo Landing Page"
        });

        // ==============================
        // TRACK BUTTON VIEW EVENT
        // ==============================
        mixpanel.track("Button Viewed", {
            whatsapp_group: group,
            button_name: "Download Button"
        });

        // ==============================
        // DOWNLOAD BUTTON FUNCTION
        // ==============================
        function logDownload() {

            const now = new Date();

            const pakistanTime = new Date(
                now.toLocaleString("en-US", {
                    timeZone: "Asia/Karachi"
                })
            );

            const timestamp = pakistanTime.toISOString();

            const userAgent = navigator.userAgent;

            // ==============================
            // MIXPANEL EVENT
            // ==============================
            mixpanel.track("Download Clicked", {
                whatsapp_group: group,
                timestamp: timestamp,
                device: userAgent,
                button_location: "Main Landing Page"
            });

            // ==============================
            // GOOGLE SHEETS LOGGING
            // ==============================
            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            new Image().src = finalURL;

            // ==============================
            // UPDATE UI STATUS
            // ==============================
            document.getElementById("status").innerHTML =
                "✅ Logged to Mixpanel & Google Sheets!";

            document.getElementById("status").style.color = "green";
        }

        // ==============================
        // BUTTON CLICK EVENT
        // ==============================
        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);

    </script>

</body>

</html>
