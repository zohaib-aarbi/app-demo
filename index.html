<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App Tracker</title>
</head>

<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">✓ DOWNLOAD / INSTALL</button>

    <div id="status"></div>

    <script>
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        // Get group from URL
        const urlParams = new URLSearchParams(window.location.search);
        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // LOG FUNCTION (FIXED)
        function logDownload() {

            const timestamp = new Date().toISOString();
            const userAgent = navigator.userAgent;

            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            console.log("Request sent:", finalURL);

            // ✅ Reliable method (NO fetch, NO CORS issues)
            const img = new Image();
            img.src = finalURL;

            document.getElementById("status").innerHTML =
                "✅ Download logged successfully!";

            document.getElementById("status").style.color = "green";
        }

        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);

    </script>

</body>

</html>
