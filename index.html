<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">✓ DOWNLOAD / INSTALL</button>

    <div id="status"></div>

    <script>
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        const DISCORD_WEBHOOK_URL =
            "https://discord.com/api/webhooks/1501248910629409000/BfWm6aa3Y3bJv8gCrvXvX9J74adiJn7LgIzddzF9RA0TeM8dpLduY7BT_fl-ZUCopSFQi";

        // ==============================
        // GET GROUP FROM URL
        // ==============================
        const urlParams = new URLSearchParams(window.location.search);
        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // ==============================
        // MAIN FUNCTION
        // ==============================
        function logDownload() {

            // Pakistan Time (UTC+5)
            const now = new Date();

            const pakistanTime = new Date(
                now.toLocaleString("en-US", { timeZone: "Asia/Karachi" })
            );

            const timestamp = pakistanTime.toISOString();
            const userAgent = navigator.userAgent;

            // ==============================
            // GOOGLE SHEETS (RELIABLE)
            // ==============================
            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            new Image().src = finalURL;

            // ==============================
            // DISCORD WEBHOOK (SAFE VERSION)
            // ==============================
            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: `📲 New Download\nGroup: ${group}\nTime: ${timestamp} (Pakistan Time UTC+5)\nDevice: ${userAgent}`
                })
            })
                .then(res => console.log("Discord status:", res.status))
                .catch(err => console.log("Discord error:", err));

            // ==============================
            // UI UPDATE
            // ==============================
            document.getElementById("status").innerHTML =
                "✅ Logged to Sheets + Discord!";

            document.getElementById("status").style.color = "green";
        }

        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);
    </script>

</body>
