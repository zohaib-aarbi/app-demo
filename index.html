<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App Tracker</title>
</head>

<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">✓ DOWNLOAD / INSTALL</button>

    <div id="status"></div>

    <script>
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        const DISCORD_WEBHOOK_URL =
            "https://discord.com/api/webhooks/1501521342971908178/mg_smveJ05WcmQXrRpJF4Nf74iHdPBymykVCJTesrgHlqC6G85bqzwRdVGj5Uxt_DaZg";

        // ==============================
        // GET GROUP FROM URL
        // ==============================
        const urlParams = new URLSearchParams(window.location.search);
        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // ==============================
        // MAIN LOG FUNCTION
        // ==============================
        function logDownload() {

            const timestamp = new Date().toISOString();
            const userAgent = navigator.userAgent;

            // ==============================
            // 1. GOOGLE SHEETS (SAFE GET)
            // ==============================
            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            console.log("Sheet Request:", finalURL);

            const img = new Image();
            img.src = finalURL;

            // ==============================
            // 2. DISCORD WEBHOOK (FIXED)
            // ==============================
            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: `📲 New Download\nGroup: ${group}\nTime: ${timestamp}\nDevice: ${userAgent}`
                })
            }).catch(err => console.log("Discord error:", err));

            // ==============================
            // UI UPDATE
            // ==============================
            document.getElementById("status").innerHTML =
                "✅ Logged to Sheets + Discord!";

            document.getElementById("status").style.color = "green";
        }

        // ==============================
        // BUTTON EVENT
        // ==============================
        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);

    </script>

</body>

</html>
