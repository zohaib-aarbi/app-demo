<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App Tracker</title>
</head>

<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">✓ DOWNLOAD / INSTALL</button>

    <div id="status"></div>

    <script>
        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";

        // Get group from URL
        const urlParams = new URLSearchParams(window.location.search);
        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;

        // LOG FUNCTION (FIXED)
        function logDownload() {

            const timestamp = new Date().toISOString();
            const userAgent = navigator.userAgent;

            const finalURL =
                `${GOOGLE_SCRIPT_URL}?group=${encodeURIComponent(group)}&timestamp=${encodeURIComponent(timestamp)}&userAgent=${encodeURIComponent(userAgent)}`;

            console.log("Sheet Request:", finalURL);

            // ✅ 1. Google Sheets (reliable GET)
            const img = new Image();
            img.src = finalURL;

            // ==============================
            // ✅ 2. DISCORD WEBHOOK
            // ==============================

            const DISCORD_WEBHOOK_URL = "YOUR_DISCORD_WEBHOOK_URL_HERE";

            fetch(DISCORD_WEBHOOK_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    content: `📲 New Download\nGroup: ${group}\nTime: ${timestamp}\nDevice: ${userAgent}`
                })
            }).catch(err => console.log("Discord error:", err));

            document.getElementById("status").innerHTML =
                "✅ Logged to Sheets + Discord!";

            document.getElementById("status").style.color = "green";
        }

    </script>

</body>

</html>
