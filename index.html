<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo App Tracker</title>
</head>

<body>

    <h1>📲 Demo App</h1>

    <div id="groupLabel">Loading...</div>

    <button id="downloadBtn">
        ✓ DOWNLOAD / INSTALL
    </button>

    <div id="status"></div>

    <script>
        // ===================================
        // GOOGLE APPS SCRIPT DEPLOYED URL
        // ===================================

        const GOOGLE_SCRIPT_URL =
            "https://script.google.com/macros/s/AKfycbxSMysT9rXb5ezI56hgks-1qCy97eqHJk_sLCUB8t0IbV09qwF0lDHWIgg5-24j1YE/exec";


        // ===================================
        // GET GROUP FROM URL
        // Example:
        // ?group=1
        // ?group=2
        // ===================================

        const urlParams = new URLSearchParams(window.location.search);

        let group = urlParams.get("group");

        if (!group || (group !== "1" && group !== "2")) {
            group = "unknown";
        }

        document.getElementById("groupLabel").innerText =
            `WhatsApp Group ${group}`;


        // ===================================
        // BUTTON CLICK → SEND TO GOOGLE SHEET
        // ===================================

        async function logDownload() {
            const timestamp = new Date().toISOString();
            const userAgent = navigator.userAgent;

            try {
                // IMPORTANT:
                // NO headers: Content-Type JSON
                // because Apps Script often fails with it

                await fetch(GOOGLE_SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        group: group,
                        timestamp: timestamp,
                        userAgent: userAgent
                    })
                });

                document.getElementById("status").innerHTML =
                    "✅ Download logged successfully!";

                document.getElementById("status").style.color =
                    "green";

            } catch (error) {
                console.error(error);

                document.getElementById("status").innerHTML =
                    "⚠️ Logging failed. Please try again.";

                document.getElementById("status").style.color =
                    "red";
            }
        }

        document
            .getElementById("downloadBtn")
            .addEventListener("click", logDownload);

    </script>

</body>

</html>
